<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1160" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="580" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">Arquitetura do Sistema — Padrão Servidor Interceptador</text>
  <text x="580" y="66" text-anchor="middle" font-size="14" fill="#475569">O frontend nunca fala diretamente com o hardware: toda requisição passa pelo Django antes de virar um comando MQTT.</text>

  <!-- Column A: Clients -->
  <g>
    <rect x="40" y="190" width="180" height="90" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="130" y="228" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1b4b">Dashboard Web</text>
    <text x="130" y="248" text-anchor="middle" font-size="12.5" fill="#3730a3">Anfitrião (React)</text>

    <rect x="40" y="320" width="180" height="90" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="130" y="358" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1b4b">App Hóspede</text>
    <text x="130" y="378" text-anchor="middle" font-size="12.5" fill="#3730a3">React Native / Expo</text>
  </g>

  <!-- Column B: Django -->
  <g>
    <rect x="285" y="240" width="190" height="120" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
    <text x="380" y="285" text-anchor="middle" font-size="15" font-weight="600" fill="#064e3b">Django REST API</text>
    <text x="380" y="305" text-anchor="middle" font-size="12.5" fill="#065f46">Servidor Interceptador</text>
    <text x="380" y="323" text-anchor="middle" font-size="11.5" fill="#065f46">valida regras de negócio</text>
  </g>

  <!-- Column C: HiveMQ -->
  <g>
    <rect x="555" y="240" width="190" height="120" rx="12" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
    <text x="650" y="285" text-anchor="middle" font-size="15" font-weight="600" fill="#7c2d12">HiveMQ Cloud</text>
    <text x="650" y="305" text-anchor="middle" font-size="12.5" fill="#9a3412">Broker MQTT</text>
    <text x="650" y="323" text-anchor="middle" font-size="11.5" fill="#9a3412">TLS · porta 8883</text>
  </g>

  <!-- Column D: ESP32 -->
  <g>
    <rect x="825" y="240" width="160" height="120" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="905" y="285" text-anchor="middle" font-size="15" font-weight="600" fill="#1e3a8a">ESP32</text>
    <text x="905" y="305" text-anchor="middle" font-size="12.5" fill="#1e40af">Firmware</text>
    <text x="905" y="323" text-anchor="middle" font-size="11.5" fill="#1e40af">MQTT + BLE GATT</text>
  </g>

  <!-- Column E: Actuator / Sensors -->
  <g>
    <rect x="1025" y="190" width="115" height="90" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="1082" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Acoplador</text>
    <text x="1082" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">óptico +</text>
    <text x="1082" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">Fechadura</text>

    <rect x="1025" y="320" width="115" height="90" rx="12" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
    <text x="1082" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">DHT22</text>
    <text x="1082" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#1e293b">+ MQ-5</text>
    <text x="1082" y="384" text-anchor="middle" font-size="12" fill="#475569">(sensores)</text>
  </g>

  <!-- Arrows: clients -> Django -->
  <line x1="220" y1="235" x2="283" y2="278" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="220" y1="365" x2="283" y2="322" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="300" text-anchor="middle" font-size="11" fill="#334155">HTTP REST</text>

  <!-- Arrows: Django <-> HiveMQ -->
  <line x1="478" y1="300" x2="552" y2="300" stroke="#334155" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="515" y="288" text-anchor="middle" font-size="11" fill="#334155">MQTT</text>

  <!-- Arrows: HiveMQ <-> ESP32 -->
  <line x1="748" y1="300" x2="822" y2="300" stroke="#334155" stroke-width="2.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="785" y="288" text-anchor="middle" font-size="11" fill="#334155">TLS</text>

  <!-- Labels for command / telemetry direction, placed below the MQTT chain -->
  <text x="650" y="400" text-anchor="middle" font-size="12.5" fill="#475569">→ comandos: "OPEN", "SET_BLE_TOKEN"     ← status "ONLINE/OFFLINE" e telemetria de sensores</text>

  <!-- Arrows: ESP32 -> actuator, sensors -> ESP32 -->
  <line x1="988" y1="260" x2="1022" y2="235" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1005" y="222" text-anchor="middle" font-size="10.5" fill="#334155">"OPEN"</text>

  <line x1="1022" y1="345" x2="988" y2="330" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1005" y="380" text-anchor="middle" font-size="10.5" fill="#334155">leitura</text>

  <!-- BLE fallback: App Hóspede -> ESP32, dashed curve below everything -->
  <path d="M 220,395 C 500,470 700,470 905,362" fill="none" stroke="#b45309" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrowAmber)"/>
  <text x="560" y="460" text-anchor="middle" font-size="12.5" fill="#92400e" font-weight="600">BLE — fallback offline (sem internet)</text>

  <!-- Legend -->
  <g transform="translate(40, 505)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#334155" stroke-width="2.5"/>
    <text x="50" y="4" font-size="12.5" fill="#334155">Fluxo online — HTTP / MQTT (TLS)</text>

    <line x1="330" y1="0" x2="370" y2="0" stroke="#b45309" stroke-width="2.5" stroke-dasharray="8 6"/>
    <text x="380" y="4" font-size="12.5" fill="#92400e">Fallback offline — BLE direto ao ESP32</text>
  </g>

  <text x="580" y="555" text-anchor="middle" font-size="11.5" fill="#94a3b8">Sistema de Controle de Acesso Inteligente para Imóveis de Aluguel — Fernando Futila, UFSC Araranguá</text>
</svg>
