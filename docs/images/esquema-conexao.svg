<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 660" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1080" height="660" fill="#ffffff"/>

  <!-- Title -->
  <text x="540" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Esquema de Conexão — ESP32 e Periféricos</text>
  <text x="540" y="58" text-anchor="middle" font-size="13.5" fill="#475569">Mapeamento de GPIOs, alimentação e isolamento galvânico do circuito de acionamento</text>

  <!-- ESP32 board -->
  <rect x="60" y="230" width="200" height="210" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="160" y="215" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a8a">ESP32 DevKit v1</text>
  <circle cx="260" cy="260" r="4.5" fill="#0f172a"/>
  <circle cx="260" cy="290" r="4.5" fill="#0f172a"/>
  <circle cx="260" cy="335" r="4.5" fill="#0f172a"/>
  <circle cx="260" cy="380" r="4.5" fill="#0f172a"/>
  <circle cx="260" cy="410" r="4.5" fill="#0f172a"/>
  <text x="150" y="264" text-anchor="end" font-size="12.5" fill="#1e3a8a">GPIO 27</text>
  <text x="150" y="294" text-anchor="end" font-size="12.5" fill="#1e3a8a">3V3</text>
  <text x="150" y="339" text-anchor="end" font-size="12.5" fill="#1e3a8a">GPIO 34</text>
  <text x="150" y="384" text-anchor="end" font-size="12.5" fill="#1e3a8a">GND</text>
  <text x="150" y="414" text-anchor="end" font-size="12.5" fill="#1e3a8a">GPIO 23</text>

  <!-- GND bus (control side) -->
  <line x1="480" y1="150" x2="480" y2="540" stroke="#0f172a" stroke-width="2"/>
  <text x="486" y="150" font-size="11" fill="#0f172a" font-style="italic">GND (circuito de controle)</text>

  <!-- DHT22 -->
  <rect x="560" y="120" width="200" height="90" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="660" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#14532d">DHT22</text>
  <text x="660" y="170" text-anchor="middle" font-size="12" fill="#166534">Temperatura / Umidade</text>
  <circle cx="560" cy="145" r="4" fill="#0f172a"/>
  <circle cx="560" cy="165" r="4" fill="#0f172a"/>
  <circle cx="560" cy="195" r="4" fill="#0f172a"/>
  <text x="553" y="141" text-anchor="end" font-size="10.5" fill="#dc2626">VCC 3V3</text>
  <text x="553" y="161" text-anchor="end" font-size="10.5" fill="#2563eb">DATA</text>
  <text x="553" y="199" text-anchor="end" font-size="10.5" fill="#0f172a">GND</text>

  <!-- Wires: GPIO27 -> DHT22 DATA (blue = signal) -->
  <polyline points="260,260 500,260 500,165 560,165" fill="none" stroke="#2563eb" stroke-width="2"/>
  <!-- Wires: 3V3 -> DHT22 VCC (red = power) -->
  <polyline points="260,290 520,290 520,145 560,145" fill="none" stroke="#dc2626" stroke-width="2"/>
  <!-- Wire: DHT22 GND -> bus -->
  <polyline points="560,195 480,195" fill="none" stroke="#0f172a" stroke-width="2"/>
  <!-- Wire: ESP32 GND pin -> bus -->
  <polyline points="260,380 480,380" fill="none" stroke="#0f172a" stroke-width="2"/>

  <!-- MQ-5 -->
  <rect x="560" y="290" width="200" height="90" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="660" y="320" text-anchor="middle" font-size="14" font-weight="600" fill="#713f12">Módulo MQ-5</text>
  <text x="660" y="340" text-anchor="middle" font-size="12" fill="#854d0e">Gás/Fumaça (saída AO)</text>
  <circle cx="560" cy="335" r="4" fill="#0f172a"/>
  <circle cx="560" cy="365" r="4" fill="#0f172a"/>
  <text x="553" y="331" text-anchor="end" font-size="10.5" fill="#2563eb">AO</text>
  <text x="553" y="369" text-anchor="end" font-size="10.5" fill="#0f172a">GND</text>

  <!-- Wire: GPIO34 -> MQ-5 AO (straight, blue) -->
  <polyline points="260,335 560,335" fill="none" stroke="#2563eb" stroke-width="2"/>
  <!-- Wire: MQ-5 GND -> bus -->
  <polyline points="560,365 480,365" fill="none" stroke="#0f172a" stroke-width="2"/>

  <!-- Fonte 5V externa -->
  <rect x="650" y="225" width="110" height="45" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="705" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Fonte 5V</text>
  <polyline points="705,270 705,290" fill="none" stroke="#dc2626" stroke-width="2"/>

  <!-- PC817 optocoupler -->
  <rect x="560" y="460" width="100" height="90" rx="10" fill="#fdf2f8" stroke="#be185d" stroke-width="2"/>
  <text x="610" y="490" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">PC817</text>
  <text x="610" y="508" text-anchor="middle" font-size="10.5" fill="#9d174d">Acoplador</text>
  <text x="610" y="522" text-anchor="middle" font-size="10.5" fill="#9d174d">óptico</text>
  <circle cx="560" cy="480" r="4" fill="#0f172a"/>
  <circle cx="560" cy="530" r="4" fill="#0f172a"/>
  <circle cx="660" cy="480" r="4" fill="#0f172a"/>
  <circle cx="660" cy="530" r="4" fill="#0f172a"/>
  <text x="553" y="476" text-anchor="end" font-size="10" fill="#2563eb">pino 1</text>
  <text x="553" y="544" text-anchor="end" font-size="10" fill="#0f172a">pino 2</text>

  <!-- Wire: GPIO23 -> PC817 pin1 (via resistor limitador) -->
  <polyline points="260,410 520,410 520,480 560,480" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text x="390" y="402" text-anchor="middle" font-size="10.5" fill="#334155">R limitador (≈330 Ω)</text>
  <!-- Wire: PC817 pin2 -> bus -->
  <polyline points="560,530 480,530" fill="none" stroke="#0f172a" stroke-width="2"/>

  <!-- Isolation boundary through PC817 -->
  <line x1="610" y1="435" x2="610" y2="595" stroke="#b45309" stroke-dasharray="7 5" stroke-width="2.5"/>
  <text x="610" y="620" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400e">⚡ isolamento galvânico — sem continuidade elétrica</text>
  <text x="610" y="637" text-anchor="middle" font-size="11" fill="#92400e">separa o circuito de controle (3,3 V) do circuito da fechadura (12 V)</text>

  <!-- Fechadura solenoide -->
  <rect x="730" y="460" width="140" height="90" rx="10" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="800" y="495" text-anchor="middle" font-size="13.5" font-weight="600" fill="#312e81">Fechadura</text>
  <text x="800" y="513" text-anchor="middle" font-size="12" fill="#3730a3">Solenoide 12V</text>

  <!-- Fonte 12V -->
  <rect x="930" y="460" width="110" height="90" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="985" y="500" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Fonte</text>
  <text x="985" y="518" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">12V / 1A</text>

  <!-- Wires: PC817 output -> Fechadura -> Fonte12V (lado isolado) -->
  <polyline points="660,505 730,505" fill="none" stroke="#4338ca" stroke-width="2.5"/>
  <polyline points="870,505 930,505" fill="none" stroke="#4338ca" stroke-width="2.5"/>
  <text x="900" y="545" text-anchor="middle" font-size="10.5" fill="#312e81" font-style="italic">GND (12V) — isolado, não</text>
  <text x="900" y="558" text-anchor="middle" font-size="10.5" fill="#312e81" font-style="italic">compartilhado com o ESP32</text>

  <!-- Bracket for isolated 12V circuit -->
  <path d="M 615,585 L 615,595 L 1040,595 L 1040,585" fill="none" stroke="#4338ca" stroke-width="1.5"/>
  <text x="827" y="575" text-anchor="middle" font-size="11" fill="#312e81">circuito isolado — alimentação 12 V</text>

  <!-- Legend -->
  <g transform="translate(60, 60)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#2563eb" stroke-width="2.5"/>
    <text x="36" y="4" font-size="11.5" fill="#334155">Sinal / dado</text>

    <line x1="150" y1="0" x2="180" y2="0" stroke="#dc2626" stroke-width="2.5"/>
    <text x="186" y="4" font-size="11.5" fill="#334155">Alimentação</text>

    <line x1="290" y1="0" x2="320" y2="0" stroke="#0f172a" stroke-width="2.5"/>
    <text x="326" y="4" font-size="11.5" fill="#334155">GND</text>
  </g>

  <text x="540" y="655" text-anchor="middle" font-size="11" fill="#94a3b8">Pinagem consolidada a partir de firmware/main/main.ino e da monografia (Cap. 3 e 4) — Fernando Futila, UFSC Araranguá</text>
</svg>
